<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
}

.big {
    font-size: 40px;
    font-weight: bold;
    color: #22c55e;
}

h2 {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 AI Financial Dashboard</h1>

<div class="card" id="score"></div>
<div class="card" id="decisions"></div>
<div class="card" id="plan"></div>
<div class="card" id="impact"></div>

<a href="simulate.html">
<button style="width:100%; padding:14px; background:#3b82f6; border:none; border-radius:10px;">
⚡ Simulate Life Event
</button>
</a>

</div>

<script>
let data = JSON.parse(localStorage.getItem("financeData"));

let income = data.income;
let expense = data.expense;
let savings = income - expense;
let rate = (savings / income) * 100;

let score = Math.max(20, Math.min(100, Math.round(rate)));

let issues = "";
if (rate < 10) issues += "❌ Very low savings<br>";
if (data.lifestyle === "high") issues += "⚠️ High lifestyle spending<br>";
if (data.savings < expense * 3) issues += "❌ No emergency fund<br>";

let sip = Math.round(savings * 0.3);
let yearly = sip * 12;

document.getElementById("score").innerHTML =
`<div class="big">${score} / 100</div>${issues}`;

document.getElementById("decisions").innerHTML =
`<h2>💡 AI Decisions</h2>
<p>Invest ₹${sip}/month in SIP</p>
<p>Reduce expenses by ₹${Math.round(expense * 0.1)}</p>
<p>Get health insurance</p>`;

document.getElementById("plan").innerHTML =
`<h2>📅 Monthly Plan</h2>
<p>Week 1 → Track expenses</p>
<p>Week 2 → Cut unnecessary spending</p>
<p>Week 3 → Start SIP</p>
<p>Week 4 → Emergency fund</p>`;

document.getElementById("impact").innerHTML =
`<h2>📈 AI Impact</h2>
<p><strong>You can save ₹${yearly}/year</strong></p>`;
</script>

</body>
</html>
