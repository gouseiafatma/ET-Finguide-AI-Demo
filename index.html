<!DOCTYPE html>
<html>
<head>
    <title>ET FinGuide AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
        }

        p {
            color: gray;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>💰 ET FinGuide AI</h1>
    <p>Your AI Financial Decision Engine</p>

    <form action="result.html">
        <input type="number" placeholder="Monthly Income" required>
        <input type="number" placeholder="Monthly Expenses" required>
        <input type="number" placeholder="Current Savings" required>

        <select>
            <option>Save Money</option>
            <option>Invest</option>
            <option>Buy Something</option>
            <option>Financial Stability</option>
        </select>

        <select>
            <option>Low Risk</option>
            <option>Medium Risk</option>
            <option>High Risk</option>
        </select>

        <select>
            <option>Low Lifestyle</option>
            <option>Medium Lifestyle</option>
            <option>High Lifestyle</option>
        </select>

        <button>Analyze My Finances</button>
    </form>
</div>

</body>
</html>
