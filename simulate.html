<!DOCTYPE html>
<html>
<head>
<title>AI Simulation</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
}
</style>
</head>

<body>

<div class="card">
<h2>🤖 AI Life Event Simulator</h2>

<select id="event">
    <option>Bonus ₹50K</option>
    <option>Salary Increase</option>
    <option>Big Expense</option>
</select>

<br><br>

<button onclick="simulate()">Run Simulation</button>

<p id="output"></p>
</div>

<script>
function simulate(){
    document.getElementById("output").innerHTML =
    "⚡ AI Update: Increase SIP to ₹5,000 and reach goal faster.";
}
</script>

</body>
</html>
